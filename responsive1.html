<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;


        }

        .container {
            display: grid;
            background-color: white;
            padding: 20px;
            gap: 20px;
            width: 800px
        }

        .header {
            /* grid-column: 1/2; */
            background-color: orangered;
            height: 65px;
            border-radius: 5px;
        }

        .main {
            display: flex;
            grid-column: 1/2;
            gap: 10px;
        
        }

        .left {
            background-color: green;
            width: 100%;
            height: 50vh;
            border-radius: 10px;
        }

        .right {
            background-color: teal;
            width: 100%;
            height: 50vh;
            border-radius: 10px;

        }

        @media (max-width:1024px) {


            .main {
                display: flex;
                flex-direction: column;

            }

            .left,
            .right {
                height: 30vh;
            }
        }



        @media (max-width:360px) {


            .main {
                display: flex;
                flex-direction:column-reverse;

            }

            .left,
            .right {
                height: 30vh;
            }

        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header"></div>
        <div class="main">
            <div class="left"></div>
            <div class="right"></div>
        </div>

    </div>
    </div>
</body>

</html>
