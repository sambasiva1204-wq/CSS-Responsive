<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            display: grid;
            background-color: white;
            padding: 20px;
            gap: 20px;
            width: 800px;

        }

        .header {
            background-color:yellowgreen;
            height: 65px;
            border-radius: 10px;
        }

        .main {
            display: flex;
            grid-column: 1/2;
            gap: 10px;

        }

        .left {
            background-color:blue;
            width: 100%;
            height: 50vh;
            border-radius: 10px;
        }

        .right {
            background-color: palevioletred;
            width: 100%;
            height: 50vh;
            border-radius: 10px;
        }

        .up {
            background-color: red;
            height: 65px;
            border-radius: 10px;
        }

        .down {
            background-color: black;
            height: 65px;
            border-radius: 10px;
        }

        @media(max-width:1024px) {
            .main {
                display: flex;
                flex-direction: column;

            }

            .right,
            .left {
                height: 30vh;

            }

            .up {   
                display: flex;
                flex-direction: row;
            }

            .down {
                display: flex;
                flex-direction: row;
            }
        }

        @media(max-width:652px) {
            .main {
                display: flex;
                flex-direction: column-reverse;

            }

            .right,
            .left {
                height: 30vh;
            }

            .up,.down {
                display: flex;
                flex-direction: column-reverse;
            }

            .down {
                display: flex;
                flex-direction: row;
            }

        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header"></div>
        <div class="main">
            <div class="left"></div>
            <div class="right"></div>
        </div>
        <div class="up"></div>
        <div class="down"></div>
    </div>

</body>

</html>
