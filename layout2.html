<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex Layout</title>
    <!-- <link rel="stylesheet" href="style.css"> -->
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {

            padding: 20px;
        

        }

        .row1,
        .row2,
        .row3 {
            display: flex;
            flex-direction: row;
            width: 500px;
            height: 100px;
            gap: 10%;
            flex-wrap: wrap;
            padding: 20px;
        }

        .big {
            display: flex;
            flex: 2;
            background-color: teal;
            border-radius: 5px;
            
        }

        .box {
            display: flex;
            background-color: teal;
            width: 100px;
            height: 100px;
            border-radius: 5px;

        }
    </style>

</head>

<body>

    <div class="container">

        <div class="row1">
            <div class="box"></div>
            <div class="big">
                <div class="box"></div>
                <div class="box"></div>
            </div>
            <div class="box"></div>
        </div>

        <div class="row2">
            <div class="big">
                <div class="box"></div>
                <div class="box"></div>
            </div>
            <div class="box"></div>
            <div class="box"></div>
        </div>

        <div class="row3">
            <div class="box"></div>
            <div class="box"></div>
            <div class="big">
                <div class="box"></div>
                <div class="box"></div>
            </div>
        </div>

    </div>

</body>

</html>
</body>

</html>
