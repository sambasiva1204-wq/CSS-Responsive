<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container{
            display: grid;
            background-color: white;
            padding: 20px;
            gap: 30px;
            width:100%;
        }
        .header{
            grid-column: 1/2;
            background-color: orangered;
            height: 65px;
            border-radius: 5px;
        }
        .main{
            display: flex;
            grid-column: 1/2;
            gap: 30px;
        }
        .left{
            background-color:rgba(10, 221, 10, 0.911);
            width: 30%;
            height: 50vh;
            border-radius: 5px;
        }
        .right{
            background-color: teal;
            width: 100%;
            height: 50vh;
            border-radius: 5px;

        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header"></div>
        <div class="main">
            <div class="left"></div>
            <div class="right"></div>
        </div>
    </div>
</body>
</html>
