<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .container {
            padding: 20px;
            background-color: white;
        }

        .header {
            background-color: yellow;
            width: 100%;
            height: 70px;
            border: 1px solid red;
            margin-bottom: 1%;

        }

        .main {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .box {
            height: 150px;
            width: 100%;
            border: 1px solid black;
            height: 30vh;
        }

        @media (max-width:768px) {
            .header {
                width: 100%;
            }

            .main {
                width: 100%;
                grid-template-columns: repeat(2, 1fr);
            }

            .box1 {
                order: 1;
            }

            .box3 {
                order: 2;
            }

            .box2 {
                order: 3;
            }

            .box4 {
                order: 4;
            }


        }

        @media (max-width:450px) {
            .header {
                width: 100%;
            }

            .main {
                width: 100%;
                grid-template-columns: repeat(1, 1fr);
            }

            .box1 {
                order: 1;
            }

            .box4 {
                order: 2;
            }

            .box2 {
                order: 3;
            }

            .box3 {
                order: 4;
            }


        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">Navigation</div>
        <div class="main">

            <div class="box box1" style="background-color: red;">BOX1</div>
            <div class="box box2" style="background-color: green;">BOX2</div>
            <div class="box box3" style="background-color: blue;">BOX3</div>
            <div class="box box4" style="background-color: rgba(192, 192, 197, 0.521);">BOX4</div>

        </div>
    </div>

</body>

</html>
