<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    body {
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;

}

.container {
    display: grid;
    grid-template-columns: repeat(4, 100px);
    gap: 20px;
    background-color: white;
}


.box {
    width: 100px;
    height: 100px;
    background-color:teal;
    border-radius: 15px;
}


.b1{
    grid-column: 1 / 2;
}

.b2 {
    grid-column: 1 / 2;
}

.b3 {
    grid-column: 2 / 3;
}

.b4 {
    grid-column: 1 / 2;
}

.b5 {
    grid-column: 2 / 3;
}

.b6 {
    grid-column: 3 / 4;
}

.b7 {
    grid-column: 1 / 2;
}

.b8 {
    grid-column: 2 / 3;
}

.b9 {
    grid-column: 3 / 4;
}

.b10 {
    grid-column: 4 / 5;
}
    </style>
</head>
<body>
    <div class="container">
    <div class="box b1"></div> 
    <div class="box b2"></div>
    <div class="box b3"></div>
    <div class="box b4"></div>
    <div class="box b5"></div>
    <div class="box b6"></div>
    <div class="box b7"></div>
    <div class="box b8"></div>
    <div class="box b9"></div>
    <div class="box b10"></div>
</div>

</body>
</html>
</body>
</html>
