<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>score card game</title>
</head>

<body>
    <style>
            body {
                margin: 0;
                font-family: Arial, Helvetica, sans-serif;
            }
             .container {
                display: flex;
                justify-content: space-around;
                padding: 40px;
                gap: 20px;
            }
             .left {
                text-align: center;
            }

            .box {
                background: #bbb;
                width: 290px;
                height: 110px;
                display: flex;
                align-items: center;
                justify-content: center;
                margin: 10px auto;
                font-size: 30px;
                border: 2px solid black;
            }

            .left h2 {
                font-size: 30px;
                font-weight: 100;
            }

            .minmax {
                display: flex;
                margin: 20px;
                gap: 100px;
                font-size: 25px;
            }

            .min,
            .max {
                width: 140px;
                height: 90px;
                display: flex;
                align-items: center;
                justify-content: center;
                color: #000;
                font-size: 25px;
                border: 2px solid black;
            }
             .score-box {
                background: #bbb;
                width: 290px;
                height: 110px;
                margin: 10px auto;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 50px;
                border: 2px solid black;
            }
            .buttons {
                display: grid;
                grid-template-columns: repeat(3, 80px);
                gap: 25px;
                justify-content: center;
                margin-top: 30px;
             }
              .btn {
                cursor: pointer;
                width: 80px;
                height: 80px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 25px;
                color: #000;
                border: 2px solid black;
            }
            .enter {
                margin-top: 20px;
                background: black;
                color: white;
                padding: 25px 110px;
                font-size: 20px;
                border: none;
            }
            .right {
                width: 300px;
                padding: 90px;
            }
            .right h1 {
                text-align: center;
            }

            .list {
                margin-top: 20px;
                font-size: 30px;
                line-height: 63px;
                text-align: center;
                padding-bottom: 30px;
            }

            .action-btn {
                display: block;
                width: 100%;
                margin-top: 30px;
                padding: 15px;
                background: black;
                color: white;
                border: none;
                font-size: 18px;
                line-height: 50px;
            }
        </style>
    </head>

    <body>

        <div class="container">
            <div class="left">
                <h2>TOTAL</h2>
                <div class="box">-</div>

                <div class="minmax">
                    <div>
                        <div class="min" style="background-color: red;">-</div>
                        <p>MIN</p>
                    </div>

                    <div>
                        <div class="max" style="background-color:rgb(9, 206, 9);">-</div>
                        <p>MAX</p>
                    </div>
                </div>

                <h2>SCORE</h2>
                <div class="score-box" id="score">#</div>

                <div class="buttons">
                    <div class="btn" onclick="showScore(1)" style="background-color: rgb(131, 131, 5);">1</div>
                    <div class="btn" onclick="showScore(2)" style="background-color:orange;">2</div>
                    <div class="btn" onclick="showScore(3)" style="background-color:rgb(131, 131, 5) ">3</div>
                    <div class="btn" onclick="showScore(4)" style="background-color: orange;">4</div>
                    <div class="btn" onclick="showScore(5)" style="background-color: orange;">5</div>
                    <div class="btn" onclick="showScore(6)" style="background-color: orange;">6</div>
                    <div class="btn" onclick="showScore(7)" style="background-color:rgb(131, 131, 5);">7</div>
                    <div class="btn" onclick="showScore(8)" style="background-color:orange;">8</div>
                    <div class="btn" onclick="showScore(9)" style="background-color:rgb(131, 131, 5);">9</div>
                    <div></div>
                    <div class="btn" onclick="showScore(0)" style="background-color: purple; color: white;">0</div>
                    <div></div>
                </div>

                <button class="enter">ENTER</button>

            </div>
            <div class="right">

                <h1>GAME SCORES</h1>

                <div class="list">
                    Game 1 - 30<br>
                    Game 2 - 50<br>
                    Game 3 - 100<br>
                    Game 4 - 300<br>
                    Game 5 - 20<br>
                    Game 5 - 50<br>
                    Game 6 - 60
                </div>

                <button class="action-btn">REMOVE ALL</button>
                <button class="action-btn">REMOVE ODD</button>
                <button class="action-btn">REMOVE EVEN</button>
                <button class="action-btn">REMOVE LAST</button>

            </div>

        </div>
        <script>
            let currentScore = "";

         function showScore(num) {
             currentScore += num;
             document.getElementById("score").innerText = currentScore;
          }
        
           
        </script>

     </body>
   </html>
</body>

</html>
