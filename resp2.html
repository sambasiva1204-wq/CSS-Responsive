<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            display: flex;
            width: 50%;
            flex-direction: column;
            background: white;
            padding: 10px;
            border: 1px solid red;
        }


        .header {
            background-color: yellow;
            font-size: 2rem;
            text-align: left;
            width: 100%;
        }

        .main {
            display: flex;
            gap: 10px;
            width: 100%;
            margin-top: 1%;
        }


        .left {
            display: flex;
            background-color: red;
            width: 70%;
            /* height: 30vh; */
        }


        .right {
            display: flex;
            flex-direction: column;
            width: 30%;
            gap: 10px;
        }

        .box {

            background-color: rgb(15, 128, 0);
            height: 90px;
            padding: 10px;
        }

        @media (max-width: 768px) {

            .main {
                display: flex;
                flex-direction: column;
            }

            .header {
                width: 100%;
            }

            .left {
                width: 100%;
                height: 150px;
            }

            .right {
                display: flex;
                flex-direction: row;
                width: 100%;
            }

        }

        @media (max-width: 450px) {

            .main {
                display: flex;
                flex-direction: column;
            }

            .header {
                width: 100%;
            }

            .left {
                width: 100%;
                height: 150px;
            }

            .right {
                display: flex;
                flex-direction: column;
                width: 100%;
            }

        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">Navigation</div>

        <div class="main">
            <div class="left">LEFT BOX</div>

            <div class="right">
                <div class="box">RIGHT BOX 1</div>
                <div class="box">RIGHT BOX 2</div>
                <div class="box">RIGHT BOX 3</div>
            </div>
        </div>
    </div>

</body>

</html>
