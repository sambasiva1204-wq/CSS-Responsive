<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
 body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.row {
    display: flex;
    gap: 20px;
    justify-content: flex-start;
}

.box {
    width: 100px;
    height: 100px;
    background: teal;
    border-radius: 8px;
}
    </style>
</head>
<body>
    <div class="container">

    <div class="row">
        <div class="box "></div>
    </div>

    <div class="row">
        <div class="box"></div>
        <div class="box"></div>
    </div>

    <div class="row">
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
    </div>

    <div class="row">
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
    </div>

</div>
</body>
</html>
