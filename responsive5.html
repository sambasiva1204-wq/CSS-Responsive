<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container{
            display: grid;
            background-color: white;
            padding:20px;
            width: 100%;
            gap: 20px;
            
        }
        .header{
            background-color: blue;
            width: 100%;
            height: 10vh;
            border-radius: 5px;
        }
        
        .maincontent{
            display: flex;
            flex-direction: column;
            flex-wrap: wrap;
            height: 20vh;
            width: 100%;
            gap: 20px;
            
        }
        .box{
            display: flex;
            grid-row: 1/3;
            height:30vh;
            background-color: brown;
            border-radius: 5px;
        }
        @media (max-width:1024px) {

        .maincontent{
                display: flex;
                flex-direction:row;
            }
            .box{
                display: flex;
                flex-direction: row;
            }
        @media (max-width:500px) {
            .maincontent{
                display: flex;
                flex-direction:row;
            }
            .box{
                display: flex;
                flex-direction:row;

            }
        }    
            
            
        }
        
    </style>
</head>
<body>
    <div class="container">
        <div class="header"></div>
        <div class="maincontent">
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
        </div>
    </div>
</body>
</html>
