<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container{
            display:grid;
            background-color: white;
            width: 100%;
            padding:20px;
            gap: 20px;
        }
        .header{
            background-color: teal;
            height: 65px;
            border-radius: 10px;
        }
        .sidecontent{
            display: flex;
            grid-column: 1/2;
            gap: 10px;
        }
        .left{
            background-color: red;
            width: 100%;
            height: 30vh;
            border-radius: 10px;
        }
        .right{
            background-color:yellowgreen;
            width: 100%;
            height: 30vh;
            border-radius: 10px;
        }
        .middle{
            background-color: teal;
            height: 65px;
            border-radius: 10px;
        }
        .footer{
            display: flex;
            flex-direction: column;
            flex-wrap: wrap;
            height: 10vh;
            width: 100%;
            gap: 10px;
        }
        .box{
            display: flex;
            grid-row:1/3;
            border-radius: 10px;
            /* height: 10vh; */
            /* width:33.33%; */
            background-color: brown;
            height:20vh;
        }
        @media(max-width:1024px) {
            .sidecontent{
                display: flex;
                flex-direction: column;
            }
            .left,
            .right{
                height: 30vh;
            }
            .footer{
                display: flex;
                flex-direction: column;
            }
            .box{
                display: flex;
                flex-direction: column;
            }
        }
        @media (max-width:400px) {

            .sidecontent{
                display: flex;
                flex-direction:column-reverse;
            }
            .left,
            .right{
                height: 30vh;

            }
        }
           
                 
    </style>
</head>
<body>
    <div class="container">
        <div class="header"></div>
        <div class="sidecontent">
            <div class="left"></div>
            <div class="right"></div>
        </div>
        <div class="middle"></div>
        <div class="footer">
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
        </div>

    </div>
</body>

</html>
