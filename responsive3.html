<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .container {
            display: grid;
            background-color: white;
            padding: 20px;
            width: 100%;
            gap: 20px;
        }

        .header {
            background-color: palevioletred;
            height: 65px;
            border-radius: 20px;

        }

        .maincontent {
            background-color: black;
            height: 30vh;
            border-radius: 20px;

        }

        .footer {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            height: 20vh;
            width: 100%;
            gap: 10px;
        }

        .box {
            display: flex;
            flex-direction: row;
            grid-row: 1/3;
            width: 32.9%;
            background-color: orange;
            border-radius: 20px;
            height: 10vh;
        }

         @media (max-width :1024px) { 
            .footer {
                display: flex;
                flex-direction: column;

            }
            @media (max-width:400px){
                .footer{
                display: flex;
                flex-direction:column-reverse;
            }
        }
        } 
    </style>
</head>

<body>
    <div class="container">
        <div class="header"></div>
        <div class="maincontent"></div>
        <div class="footer">
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
        </div>
    </div>
</body>

</html>
