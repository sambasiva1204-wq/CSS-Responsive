<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            display: grid;
            gap: 20px;
            grid-template-columns: repeat(4, 100px);
            

        }

        .row1 {
            display: grid;
            grid-template-rows: repeat(4, 100px);
            gap: 15px;
        }

        .row2 {
            display: grid;
            grid-template-rows: repeat(3, 100px);
            gap: 15px;
        }

        .row3 {
            display: grid;
            grid-template-rows: repeat(2, 100px);
            gap: 15px;
        }

        .row4 {
            display: grid;
            grid-template-rows: repeat(1, 100px);
            gap: 15px;
        }

        

        .box {
            width: 100px;
            height: 100px;
            background-color: teal;
            border-radius: 15px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="row1">
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
        </div>
        <div class="row2">
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
        </div>
        <div class="row3">
            <div class="box"></div>
            <div class="box"></div>
        </div>
        <div class="row4">
            <div class="box"></div>
        </div>
    </div>
</body>

</html>
