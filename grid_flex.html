<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow-x: hidden;
            overflow-y: hidden;

        }

        .container {
            display: flex;
            width: 100%;
            align-items: center;
            justify-content: center;
            background-color: white;
            align-items: flex-end;

        }

        .box {
            width: 60px;
            height: 50px;
            border: 2px solid black;


        }

        .leftcontainer {
            display: flex;
            grid-template-columns: repeat(4, 30px);
            gap: 20px;
            align-items: self-end;
            padding: 20px;

        }

        .left1,
        .left2,
        .left3 {
            display: grid;
            gap: 20px;
        }

        .center {
            display: flex;
            flex-direction: row;
            grid-template-columns: repeat(4, 30px);
            grid-column: auto;
            gap: 20px;
            padding: 20px;
            padding-left: 5px;
        }


        .center1,
        .center2,
        .center3,
        .center4,
        .center5,
        .center6,
        .center7,
        .center8,
        .center9 {
            display: grid;
            gap: 20px;
        }

        .right {
            display: flex;
            flex-direction: row;
            grid-template-columns: repeat(6, 30px);
            grid-column: auto;

            gap: 20px;
            padding: 20px;
            padding-left: 5px;
        }

        .last {
            display: flex;
            flex-direction: row;
            grid-template-columns: repeat(7, 30px);
            grid-column: auto;

            gap: 20px;
            padding: 20px;
            padding-left: 5px;
        }

        .right1,
        .right2,
        .right3,
        .right4,
        .right5,
        .right6 {
            display: grid;
            gap: 20px;

        }
    </style>
</head>
